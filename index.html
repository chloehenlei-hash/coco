<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco's Job List</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ff;
  --surface: #ffffff;
  --card: #ffffff;
  --card-hover: #fef3ff;
  --border: rgba(180,100,255,0.12);
  --border-hover: rgba(180,100,255,0.25);
  --text: #2d1f3d;
  --muted: #9b7fc0;
  --accent: #b94fff;
  --accent2: #ff5fa0;
  --green: #00c896;
  --yellow: #ffb300;
  --red: #ff4f7b;
  --blue: #3d9eff;
  --orange: #ff7d3b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse 70% 40% at 20% 0%, rgba(255,95,160,0.08), transparent),
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(185,79,255,0.08), transparent),
    radial-gradient(ellipse 50% 30% at 50% 100%, rgba(61,158,255,0.06), transparent);
}

.wrap { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }

header {
  padding: 48px 0 36px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1.5px solid var(--border);
  margin-bottom: 36px;
}
.header-left h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 38px;
  font-style: italic;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1;
}
.header-left h1 span { color: var(--accent); }
.header-left p { color: var(--muted); font-size: 13px; margin-top: 6px; }

.btn-add {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  padding: 11px 22px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(192,132,252,0.3);
}
.btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.stat {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  box-shadow: 0 2px 12px rgba(185,79,255,0.05);
}
.stat-num {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-style: italic;
  line-height: 1;
}
.stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  color: var(--muted);
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 1px 4px rgba(185,79,255,0.06);
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(185,79,255,0.06);
}

.jobs-list { display: flex; flex-direction: column; gap: 10px; }

.job-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(185,79,255,0.06);
}
.job-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), var(--accent2));
  border-radius: 3px 0 0 3px;
  opacity: 0;
  transition: opacity 0.2s;
}
.job-card:hover { background: var(--card-hover); border-color: var(--border-hover); }
.job-card:hover::before { opacity: 1; }
.job-card.overdue { border-color: rgba(248,113,113,0.3); }
.job-card.overdue::before { background: var(--red); opacity: 1; }
.job-card.urgent { border-color: rgba(251,191,36,0.3); }
.job-card.urgent::before { background: var(--yellow); opacity: 1; }

.job-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.job-check {
  width: 20px; height: 20px;
  border: 2px solid rgba(185,79,255,0.3);
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.job-check:hover { border-color: var(--accent); background: rgba(185,79,255,0.08); }
.job-check.checked { background: var(--accent); border-color: var(--accent); }
.job-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }

.job-brand { font-size: 16px; font-weight: 600; flex: 1; }
.job-brand a { color: inherit; text-decoration: none; }
.job-brand a:hover { color: var(--accent); }

.content-type {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid;
}
.ct-IGR { color: #9333ea; border-color: rgba(147,51,234,0.25); background: rgba(147,51,234,0.08); }
.ct-IGS { color: #e0006a; border-color: rgba(224,0,106,0.25); background: rgba(224,0,106,0.08); }
.ct-IGP { color: #0077e6; border-color: rgba(0,119,230,0.25); background: rgba(0,119,230,0.08); }
.ct-TT  { color: #00a878; border-color: rgba(0,168,120,0.25); background: rgba(0,168,120,0.08); }
.ct-OTHER { color: #d95f00; border-color: rgba(217,95,0,0.25); background: rgba(217,95,0,0.08); }

.job-actions { display: flex; gap: 6px; }
.job-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--muted);
  width: 28px; height: 28px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.job-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(185,79,255,0.06); }
.job-btn.delete:hover { border-color: var(--red); color: var(--red); background: rgba(255,79,123,0.06); }

.job-meta { display: flex; gap: 20px; flex-wrap: wrap; }
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.meta-value { font-size: 13px; font-weight: 400; }
.meta-value.overdue-text { color: var(--red); }
.meta-value.urgent-text { color: var(--yellow); }
.meta-value.ok-text { color: var(--green); }

.payment-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.pay-Pending { color: #9b7fc0; background: rgba(155,127,192,0.08); border: 1px solid rgba(155,127,192,0.2); }
.pay-InProgress { color: #c47f00; background: rgba(255,179,0,0.1); border: 1px solid rgba(255,179,0,0.3); }
.pay-Completed { color: #00a06e; background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.3); }
.pay-Overdue { color: #d4004a; background: rgba(255,79,123,0.1); border: 1px solid rgba(255,79,123,0.3); }

.job-notes {
  margin-top: 10px;
  padding: 10px 12px;
  background: rgba(185,79,255,0.04);
  border-radius: 8px;
  font-size: 12px;
  color: var(--muted);
  border-left: 2px solid rgba(185,79,255,0.2);
}

/* SECTION HEADERS */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 40px 0 16px;
}
.section-header h2 {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.section-divider {
  flex: 1;
  height: 1.5px;
  background: var(--border);
  border-radius: 2px;
}
.section-count {
  font-size: 11px;
  color: var(--muted);
  background: rgba(185,79,255,0.07);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
  font-weight: 500;
  white-space: nowrap;
}

/* PAYMENT CARDS */
.pay-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(185,79,255,0.06);
  position: relative;
  overflow: hidden;
}
.pay-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--yellow);
  border-radius: 3px 0 0 3px;
}
.pay-card:hover { background: var(--card-hover); border-color: var(--border-hover); }
.pay-card.pay-completed-card { opacity: 0.45; }
.pay-card.pay-completed-card::before { background: var(--green); }
.pay-card.pay-overdue-card::before { background: var(--red); }

.pay-check {
  width: 20px; height: 20px;
  border: 2px solid rgba(0,200,150,0.35);
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.pay-check:hover { border-color: var(--green); background: rgba(0,200,150,0.08); }
.pay-check.checked { background: var(--green); border-color: var(--green); }
.pay-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }

.pay-info { flex: 1; min-width: 0; }
.pay-brand { font-size: 15px; font-weight: 600; color: var(--text); }
.pay-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
.pay-amount {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--accent);
  font-weight: 400;
  flex-shrink: 0;
}
.pay-amount.muted-amt { color: var(--muted); font-size: 14px; font-style: normal; font-family: 'DM Sans', sans-serif; }

.pay-status-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
  flex-shrink: 0;
}
.psb-Pending { color: var(--muted); background: rgba(155,127,192,0.08); border: 1px solid rgba(155,127,192,0.2); }
.psb-InProgress { color: #c47f00; background: rgba(255,179,0,0.1); border: 1px solid rgba(255,179,0,0.3); }
.psb-Completed { color: #00a06e; background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.3); }
.psb-Overdue { color: #d4004a; background: rgba(255,79,123,0.1); border: 1px solid rgba(255,79,123,0.3); }

.payment-list { display: flex; flex-direction: column; gap: 8px; }

.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
.empty h3 { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 22px; color: var(--text); margin-bottom: 8px; }

.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid rgba(185,79,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: #fff;
  border: 1.5px solid var(--border-hover);
  border-radius: 18px;
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  transform: translateY(10px);
  transition: transform 0.2s;
  box-shadow: 0 20px 60px rgba(185,79,255,0.15);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal h2 { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 24px; margin-bottom: 24px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.form-group input,
.form-group select,
.form-group textarea {
  background: #faf7ff;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  transition: border-color 0.15s;
  width: 100%;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(185,79,255,0.1); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group select option { background: #fff; color: var(--text); }

.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
.btn-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 10px 20px;
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }
.btn-save {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: white;
  padding: 10px 24px;
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(192,132,252,0.25);
  transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.9; }

.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: #fff;
  border: 1.5px solid var(--border-hover);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  z-index: 200;
  transform: translateY(10px);
  opacity: 0;
  transition: all 0.25s;
  box-shadow: 0 8px 30px rgba(185,79,255,0.15);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(0,200,150,0.4); }
.toast.error { border-color: rgba(255,79,123,0.4); }

@media (max-width: 600px) {
  header { flex-direction: column; align-items: flex-start; gap: 16px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .job-meta { gap: 12px; }
  .modal { padding: 20px; }
}

/* DAILY REMINDER POPUP */
.reminder-overlay {
  position: fixed; inset: 0;
  background: rgba(45,31,61,0.45);
  backdrop-filter: blur(6px);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.25s ease;
}
.reminder-overlay.hidden { display: none; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.reminder-box {
  background: #fff;
  border: 1.5px solid var(--border-hover);
  border-radius: 20px;
  padding: 28px;
  width: 100%; max-width: 460px;
  box-shadow: 0 20px 60px rgba(185,79,255,0.18);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

.reminder-date {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.reminder-title {
  font-family: 'Instrument Serif', serif;
  font-style: italic; font-size: 26px;
  color: var(--text); margin-bottom: 20px; line-height: 1.2;
}

.reminder-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.reminder-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.reminder-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 10px;
  background: rgba(185,79,255,0.04);
  border: 1.5px solid var(--border);
}
.reminder-item.today-item { background: rgba(255,79,123,0.05); border-color: rgba(255,79,123,0.2); }
.reminder-item.overdue-item { background: rgba(255,79,123,0.08); border-color: rgba(255,79,123,0.3); }
.ri-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ri-dot.red { background: var(--red); }
.ri-dot.orange { background: var(--orange); }
.ri-dot.yellow { background: var(--yellow); }
.ri-dot.green { background: var(--green); }
.ri-brand { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }
.ri-date { font-size: 11px; color: var(--muted); }
.ri-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px;
}
.ri-badge.today { background: rgba(255,79,123,0.12); color: var(--red); }
.ri-badge.overdue { background: rgba(255,79,123,0.15); color: var(--red); }
.ri-badge.soon { background: rgba(255,179,0,0.12); color: var(--yellow); }

.reminder-empty {
  text-align: center; padding: 20px;
  color: var(--muted); font-size: 13px;
}
.reminder-empty span { font-size: 24px; display: block; margin-bottom: 8px; }

.reminder-actions { display: flex; gap: 8px; margin-top: 4px; }
.btn-remind-close {
  flex: 1; padding: 11px;
  background: rgba(185,79,255,0.07);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  transition: all 0.15s;
}
.btn-remind-close:hover { border-color: var(--accent); color: var(--accent); }
.btn-remind-dismiss {
  flex: 1; padding: 11px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  color: white; cursor: pointer;
  transition: opacity 0.15s;
  box-shadow: 0 4px 14px rgba(185,79,255,0.25);
}
.btn-remind-dismiss:hover { opacity: 0.9; }

/* HASHTAG ROW */
.hashtag-row {
  margin-top: 10px;
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px;
  background: rgba(61,158,255,0.04);
  border-radius: 9px;
  border: 1.5px solid rgba(61,158,255,0.15);
}
.hashtag-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.hashtag-text { flex: 1; font-size: 12px; color: #0077e6; font-weight: 500; line-height: 1.5; word-break: break-word; }
.hashtag-copy {
  font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  padding: 4px 10px; border-radius: 20px;
  background: rgba(61,158,255,0.1); color: #0077e6;
  border: 1px solid rgba(61,158,255,0.2);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.hashtag-copy:hover { background: #3d9eff; color: white; border-color: #3d9eff; }
.hashtag-copy.copied { background: rgba(0,200,150,0.1); color: var(--green); border-color: rgba(0,200,150,0.3); }

/* PASSWORD SCREEN */
.pwd-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  background-image: 
    radial-gradient(ellipse 70% 40% at 20% 0%, rgba(255,95,160,0.08), transparent),
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(185,79,255,0.08), transparent);
  z-index: 999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.pwd-overlay.hidden { display: none; }
.pwd-box {
  background: #fff;
  border: 1.5px solid var(--border-hover);
  border-radius: 24px;
  padding: 40px 36px;
  width: 100%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(185,79,255,0.15);
  text-align: center;
  animation: slideUp 0.3s ease;
}
.pwd-icon { font-size: 36px; margin-bottom: 16px; }
.pwd-title {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 6px;
}
.pwd-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
.pwd-input-wrap { position: relative; margin-bottom: 12px; }
.pwd-input {
  width: 100%;
  background: rgba(185,79,255,0.04);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 13px 44px 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;

}
.pwd-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(185,79,255,0.1); }
.pwd-input.error { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,79,123,0.1); }
.pwd-toggle {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--muted); padding: 0;
}
.pwd-error { font-size: 12px; color: var(--red); margin-bottom: 12px; min-height: 18px; }
.pwd-btn {

}
.pwd-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* BRIEF BUTTON */
.brief-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em;

/* BRIEF MODAL */
.brief-modal-overlay {

.brief-modal-header {

.brief-modal-title {

.brief-modal-close {

</style>
</head>
<body>
<!-- PASSWORD SCREEN -->
<div class="pwd-overlay" id="pwdOverlay">
  <div class="pwd-box">

<div class="wrap">

  <div class="stats">

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">

<script>
const SUPABASE_URL = 'https://zcganlaqwuttnqdfusrq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjZ2FubGFxd3V0dG5xZGZ1c3JxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzIxMzgsImV4cCI6MjA5MjMwODEzOH0.98zN0x-n_wf3Sc9wotUSTLXlc7a4jwfFlFEyVL4b6WQ';
const H = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

let allJobs = [], allPayments = [], currentFilter = 'all', editingId = null;
const today = new Date(); today.setHours(0,0,0,0);

function daysUntil(d) {
  if (!d) return null;
  const dt = new Date(d); dt.setHours(0,0,0,0);
  return Math.round((dt - today) / 86400000);
}
function fmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
}
function dueCls(d) {
  const n = daysUntil(d);
  if (n === null) return '';
  if (n < 0) return 'overdue';
  if (n <= 7) return 'urgent';
  return '';
}
function dueInfo(d) {
  const n = daysUntil(d);
  if (n === null) return {t:'—', c:''};
  if (n < 0) return {t:`${Math.abs(n)}d overdue`, c:'overdue-text'};
  if (n === 0) return {t:'Today!', c:'urgent-text'};
  if (n <= 7) return {t:`${n}d left`, c:'urgent-text'};
  return {t:`${n}d left`, c:'ok-text'};
}

async function api(method, path, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {method, headers:H, body: body ? JSON.stringify(body) : undefined});
  if (!r.ok) throw new Error(await r.text());
  return r.status === 204 ? null : r.json();
}

async function loadJobs() {
  try {
    const all = await api('GET','jobs?completed=eq.false&order=post_due.asc.nullslast');
    allJobs = all.filter(j => !j.is_payment);
    allPayments = all.filter(j => j.is_payment);
    render(); renderPayments(); stats();
  } catch(e) {
    document.getElementById('jobs-container').innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Connection error</h3><p>${e.message}</p></div>`;
  }
}

function stats() {
  document.getElementById('stat-total').textContent = allJobs.length;
  document.getElementById('stat-overdue').textContent = allJobs.filter(j=>daysUntil(j.post_due)<0).length;
  document.getElementById('stat-urgent').textContent = allJobs.filter(j=>{const d=daysUntil(j.post_due);return d!==null&&d>=0&&d<=7;}).length;
  document.getElementById('stat-unpaid').textContent = allPayments.filter(j=>j.payment_status!=='Completed').length;
  document.getElementById('active-count').textContent = allJobs.length + ' jobs';
  document.getElementById('pay-count').textContent = allPayments.filter(j=>j.payment_status!=='Completed').length + ' pending';
}

function renderPayments() {
  const c = document.getElementById('payment-container');
  if (!allPayments.length) {
    c.innerHTML = `<div class="empty" style="padding:32px"><div class="empty-icon" style="font-size:28px">✦</div><p>No payment items.</p></div>`;
    return;
  }
  // Sort: unpaid first, completed last
  const sorted = [...allPayments].sort((a,b) => {
    const order = {Overdue:0, InProgress:1, Pending:2, Completed:3};
    return (order[a.payment_status]||2) - (order[b.payment_status]||2);
  });
  c.innerHTML = sorted.map(j => {
    const ps = j.payment_status || 'Pending';
    const cardCls = ps === 'Completed' ? 'pay-completed-card' : ps === 'Overdue' ? 'pay-overdue-card' : '';
    const psbCls = `psb-${ps.replace(' ','')}`;
    const hasAmt = j.payment_amount && Number(j.payment_amount) > 0;
    return `<div class="pay-card ${cardCls}" id="payjob-${j.id}">
      <div class="pay-check ${ps==='Completed'?'checked':''}" onclick="completePayment(${j.id}, '${ps}')">
        ${ps==='Completed'?'<span style=\"color:white;font-size:11px;font-weight:700\">✓</span>':''}
      </div>
      <div class="pay-info">
        <div class="pay-brand">${j.brief_url?`<a href="${j.brief_url}" target="_blank" style="color:inherit;text-decoration:none">${j.brand}</a>`:j.brand}</div>
        ${j.notes?`<div class="pay-desc">${j.notes}</div>`:''}
      </div>
      ${hasAmt
        ? `<div class="pay-amount">RM ${Number(j.payment_amount).toLocaleString('en-MY',{minimumFractionDigits:0})}</div>`
        : `<div class="pay-amount muted-amt">Follow Agmt</div>`
      }
      <span class="pay-status-badge ${psbCls}">${ps.replace('InProgress','In Progress')}</span>
      <div class="job-actions">
        <button class="job-btn" onclick="openEdit(${j.id})">✎</button>
        <button class="job-btn delete" onclick="confirmDelete(${j.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function completePayment(id, currentStatus) {
  const newStatus = currentStatus === 'Completed' ? 'Pending' : 'Completed';
  try {
    await api('PATCH', `jobs?id=eq.${id}`, {payment_status: newStatus});
    showToast(newStatus === 'Completed' ? '💰 Payment marked done!' : 'Reverted', 'success');
    loadJobs();
  } catch { showToast('Error','error'); }
}

function render() {
  const c = document.getElementById('jobs-container');
  let jobs = [...allJobs];
  if (currentFilter==='overdue') jobs = jobs.filter(j=>daysUntil(j.post_due)<0);
  else if (currentFilter==='urgent') jobs = jobs.filter(j=>{const d=daysUntil(j.post_due);return d!==null&&d>=0&&d<=7;});
  else if (currentFilter==='unpaid') jobs = jobs.filter(j=>j.payment_status!=='Completed');
  else if (['IGR','IGS','IGP','TT'].includes(currentFilter)) jobs = jobs.filter(j=>j.content_type===currentFilter);

  if (!jobs.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><h3>All clear!</h3><p>No jobs here.</p></div>`;
    return;
  }

  c.innerHTML = jobs.map(j => {
    const cc = dueCls(j.post_due);
    const pi = dueInfo(j.post_due), si = dueInfo(j.storyline_due), di = dueInfo(j.draft_due);
    const payCls = `pay-${(j.payment_status||'Pending').replace(' ','')}`;
    return `<div class="job-card ${cc}" id="job-${j.id}">
      <div class="job-top">
        <div class="job-check" onclick="completeJob(${j.id})"></div>
        <div class="job-brand">${j.brand}</div>
        <span class="content-type ct-${j.content_type||'OTHER'}">${j.content_type||'—'}</span>
        ${j.brief_url ? `<a class="brief-btn" href="${j.brief_url}" target="_blank">📋 Brief</a>` : j.brief_text ? `<button class="brief-btn" onclick="openBriefModal('${j.brand.replace(/'/g,"\\'")}', this)" data-brief="${j.brief_text.replace(/"/g,'&quot;').replace(/
/g,'\\n')}">📋 Brief</button>` : ''}
        <span class="payment-badge ${payCls}">${(j.payment_status||'Pending').replace('InProgress','In Progress')}</span>
        <div class="job-actions">
          <button class="job-btn" onclick="openEdit(${j.id})">✎</button>
          <button class="job-btn delete" onclick="confirmDelete(${j.id})">✕</button>
        </div>
      </div>
      <div class="job-meta">
        ${j.storyline_due?`<div class="meta-item"><div class="meta-label">Storyline</div><div class="meta-value ${si.c}">${fmt(j.storyline_due)} <span style="font-size:11px">(${si.t})</span></div></div>`:''}
        ${j.draft_due?`<div class="meta-item"><div class="meta-label">Draft</div><div class="meta-value ${di.c}">${fmt(j.draft_due)} <span style="font-size:11px">(${di.t})</span></div></div>`:''}
        <div class="meta-item"><div class="meta-label">Post Due</div><div class="meta-value ${pi.c}">${fmt(j.post_due)}${j.post_due?` <span style="font-size:11px">(${pi.t})</span>`:''}</div></div>
        ${j.payment_amount?`<div class="meta-item"><div class="meta-label">Payment</div><div class="meta-value">RM ${Number(j.payment_amount).toLocaleString('en-MY',{minimumFractionDigits:2})}</div></div>`:''}
      </div>
      ${j.notes?`<div class="job-notes">${j.notes}</div>`:''}
    </div>`;
  }).join('');
}

async function completeJob(id) {
  try {
    await api('PATCH',`jobs?id=eq.${id}`,{completed:true});
    const card = document.getElementById(`job-${id}`);
    if (card) { card.style.transition='opacity 0.35s,transform 0.35s'; card.style.opacity='0'; card.style.transform='translateX(18px)'; }
    showToast('✓ Done!','success');
    setTimeout(loadJobs,380);
  } catch { showToast('Error','error'); }
}

async function confirmDelete(id) {
  if (!confirm('Delete this job?')) return;
  try { await api('DELETE',`jobs?id=eq.${id}`); showToast('Deleted','success'); loadJobs(); }
  catch { showToast('Error','error'); }
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal(job=null) {
  editingId = job?.id||null;
  document.getElementById('modal-title').textContent = job?'Edit Job':'Add New Job';
  document.getElementById('f-brand').value = job?.brand||'';
  document.getElementById('f-type').value = job?.content_type||'IGR';
  document.getElementById('f-brief').value = job?.brief_url||'';
  document.getElementById('f-brief-text').value = job?.brief_text||'';
  document.getElementById('f-storyline').value = job?.storyline_due||'';
  document.getElementById('f-draft').value = job?.draft_due||'';
  document.getElementById('f-post').value = job?.post_due||'';
  document.getElementById('f-amount').value = job?.payment_amount||'';
  document.getElementById('f-paystatus').value = job?.payment_status||'Pending';
  document.getElementById('f-notes').value = job?.notes||'';
  document.getElementById('f-hashtags').value = job?.hashtags||'';
  document.getElementById('modal').classList.add('open');
}
function openEdit(id) { openModal(allJobs.find(j=>j.id===id)); }
function closeModal() { document.getElementById('modal').classList.remove('open'); editingId=null; }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal')) closeModal(); }

async function saveJob() {
  const brand = document.getElementById('f-brand').value.trim();
  if (!brand) { showToast('Brand name required','error'); return; }
  const data = {
    brand,
    content_type: document.getElementById('f-type').value,
    brief_url: document.getElementById('f-brief').value.trim()||null,
    brief_text: document.getElementById('f-brief-text').value.trim()||null,
    storyline_due: document.getElementById('f-storyline').value||null,
    draft_due: document.getElementById('f-draft').value||null,
    post_due: document.getElementById('f-post').value||null,
    payment_amount: document.getElementById('f-amount').value?parseFloat(document.getElementById('f-amount').value):null,
    payment_status: document.getElementById('f-paystatus').value,
    notes: document.getElementById('f-notes').value.trim()||null,
    hashtags: document.getElementById('f-hashtags').value.trim()||null,
    completed: false
  };
  try {
    if (editingId) await api('PATCH',`jobs?id=eq.${editingId}`,data);
    else await api('POST','jobs',data);
    showToast(editingId?'✓ Updated!':'✓ Added!','success');
    closeModal(); loadJobs();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2800);
}

// PASSWORD
const PWD_KEY = 'coco_auth';
const CORRECT = 'cocoprettylittlebaby';

function checkPwd() {
  const val = document.getElementById('pwdInput').value;
  const input = document.getElementById('pwdInput');
  const err = document.getElementById('pwdError');
  if (val === CORRECT) {
    localStorage.setItem(PWD_KEY, 'true');
    document.getElementById('pwdOverlay').classList.add('hidden');
    err.textContent = '';
    input.classList.remove('error');
  } else {
    input.classList.add('error');
    err.textContent = 'Wrong password, try again 🙈';
    input.value = '';
    input.focus();
  }
}

function togglePwdVis() {
  const input = document.getElementById('pwdInput');
  const btn = document.getElementById('pwdToggle');
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}

// Check auth on load
if (localStorage.getItem(PWD_KEY) === 'true') {
  document.getElementById('pwdOverlay').classList.add('hidden');
} else {
  // Focus input
  setTimeout(() => document.getElementById('pwdInput').focus(), 100);
}

document.getElementById('today-date').textContent = today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// BRIEF MODAL
function openBriefModal(brand, btn) {
  const text = btn.getAttribute('data-brief').replace(/\\n/g, '\n');
  document.getElementById('briefModalTitle').textContent = brand + ' — Brief';
  document.getElementById('briefModalContent').textContent = text;
  document.getElementById('briefModal').classList.add('open');
}
function closeBriefModal() {
  document.getElementById('briefModal').classList.remove('open');
}
function handleBriefOverlay(e) {
  if (e.target === document.getElementById('briefModal')) closeBriefModal();
}

// HASHTAG COPY
function copyHashtag(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// DAILY REMINDER
function showReminder() {
  const TODAY_KEY = 'coco_reminder_today';
  const HIDE_UNTIL_KEY = 'coco_reminder_hide_until';
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const hideUntil = localStorage.getItem(HIDE_UNTIL_KEY);
  // "今天不再显示" hides until today 12:00 next occurrence or next day 00:00
  if (hideUntil && new Date() < new Date(hideUntil)) return;

  const upcoming = [...allJobs].filter(j => {
    const d = daysUntil(j.post_due);
    return d !== null && d <= 5;
  }).sort((a,b) => daysUntil(a.post_due) - daysUntil(b.post_due));

  document.getElementById('reminderDate').textContent = today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const container = document.getElementById('reminderItems');
  const label = document.getElementById('reminderLabel');

  if (!upcoming.length) {
    container.innerHTML = `<div class="reminder-empty"><span>🎉</span>近 5 天没有 due！</div>`;
    label.textContent = '近 5 天 Due';
  } else {
    label.textContent = `近 5 天 Due · ${upcoming.length} 个`;
    container.innerHTML = upcoming.map(j => {
      const d = daysUntil(j.post_due);
      let dotCls, badgeText, badgeCls, itemCls = '';
      if (d < 0) { dotCls='red'; badgeText=Math.abs(d)+'d overdue'; badgeCls='overdue'; itemCls='overdue-item'; }
      else if (d === 0) { dotCls='red'; badgeText='Today!'; badgeCls='today'; itemCls='today-item'; }
      else if (d <= 2) { dotCls='orange'; badgeText='in '+d+'d'; badgeCls='soon'; }
      else { dotCls='yellow'; badgeText='in '+d+'d'; badgeCls='soon'; }
      return `<div class="reminder-item ${itemCls}">
        <div class="ri-dot ${dotCls}"></div>
        <div class="ri-brand">${j.brand}</div>
        <div class="ri-date">${fmt(j.post_due)}</div>
        <span class="ri-badge ${badgeCls}">${badgeText}</span>
      </div>`;
    }).join('');
  }

  document.getElementById('reminderOverlay').classList.remove('hidden');
}

function closeReminder(action) {
  if (action === 'today') {
    // Hide until tomorrow 00:00
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(0, 0, 0, 0);
    localStorage.setItem('coco_reminder_hide_until', tomorrow.toISOString());
  }
  // 'ok' = just close, will show again next time they open (or after 12:00 refresh)
  document.getElementById('reminderOverlay').classList.add('hidden');
}

// Auto-refresh reminder at 12:00 every day
function scheduleNoonRefresh() {
  const now = new Date();
  const noon = new Date(now);
  noon.setHours(12, 0, 0, 0);
  if (now >= noon) noon.setDate(noon.getDate() + 1); // next noon if past today's
  const msUntilNoon = noon - now;
  setTimeout(() => {
    // Clear any hide-until if it's past, then show reminder
    const hideUntil = localStorage.getItem('coco_reminder_hide_until');
    if (!hideUntil || new Date() >= new Date(hideUntil)) {
      showReminder();
    }
    scheduleNoonRefresh(); // reschedule for next day
  }, msUntilNoon);
}

loadJobs().then(() => { showReminder(); scheduleNoonRefresh(); });
