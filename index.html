<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Coco's Job List</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf6ff;--card:#fff;--text:#2d1f3d;--muted:#9b7fc0;--accent:#b94fff;--accent2:#ff5fa0;--green:#00b884;--yellow:#d98b00;--red:#f04468;--blue:#2f80ed;--border:rgba(180,100,255,.16)}
*{box-sizing:border-box}body{margin:0;font-family:"DM Sans",sans-serif;background:radial-gradient(ellipse 70% 40% at 20% 0%,rgba(255,95,160,.09),transparent),radial-gradient(ellipse 60% 40% at 80% 10%,rgba(185,79,255,.1),transparent),var(--bg);color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:42px 22px 80px}header{display:flex;justify-content:space-between;gap:18px;align-items:end;border-bottom:1.5px solid var(--border);padding-bottom:28px;margin-bottom:28px}
h1{font-family:"Instrument Serif",serif;font-style:italic;font-size:40px;margin:0;line-height:1}h1 span{color:var(--accent)}.date{font-size:13px;color:var(--muted);margin-top:6px}
.sheet-link{border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;background:#fff;color:var(--accent);text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:26px 0}.stat{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 8px 28px rgba(185,79,255,.06)}.num{font-family:"Instrument Serif",serif;font-size:30px;font-style:italic}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.quick-add{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:0 8px 28px rgba(185,79,255,.06);margin:18px 0 8px}.quick-add h2{font-family:"Instrument Serif",serif;font-style:italic;font-size:24px;margin:0 0 12px}.add-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}.add-grid input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-family:inherit;color:var(--text);background:rgba(185,79,255,.03)}.add-grid input:focus{outline:none;border-color:var(--accent);background:#fff}.add-actions{display:flex;gap:8px;align-items:center;margin-top:10px}.add-actions button{border:1.5px solid var(--border);border-radius:999px;padding:8px 14px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;background:#fff;color:var(--muted)}.add-actions button.primary{border-color:var(--accent);background:rgba(185,79,255,.08);color:var(--accent)}.add-preview{display:none;margin-top:12px;border:1.5px solid var(--border);border-radius:12px;padding:14px;background:rgba(185,79,255,.035)}.add-preview.show{display:block}.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.preview-box{background:#fff;border:1px solid var(--border);border-radius:9px;padding:9px 10px}.preview-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.preview-value{font-size:13px;margin-top:3px;font-weight:700}.preview-warn{font-size:12px;color:var(--yellow);margin-top:9px}
.month-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:28px 0}.summary-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 8px 28px rgba(185,79,255,.06)}.summary-head{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:10px}.summary-title{font-family:"Instrument Serif",serif;font-style:italic;font-size:24px}.summary-total{font-family:"Instrument Serif",serif;font-size:24px;font-style:italic;color:var(--accent);white-space:nowrap}.summary-sub{font-size:12px;color:var(--muted);margin-top:3px}.edit-btn,.mini-edit,.delete-btn{border:1px solid rgba(185,79,255,.22);background:rgba(185,79,255,.07);color:var(--accent);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}.delete-btn{border-color:rgba(240,68,104,.24);background:rgba(240,68,104,.07);color:var(--red)}.done-toggle,.invoice-toggle{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(0,184,132,.24);background:rgba(0,184,132,.07);color:var(--green);border-radius:999px;padding:4px 9px;font-size:11px;font-weight:700;white-space:nowrap}.invoice-toggle{border-color:rgba(217,139,0,.28);background:rgba(217,139,0,.07);color:var(--yellow)}.done-toggle input,.invoice-toggle input{margin:0;accent-color:var(--green)}.summary-editor{display:none;margin-top:10px}.summary-editor.show{display:block}.summary-picker{max-height:260px;overflow:auto;border:1.5px solid var(--border);border-radius:10px;background:rgba(185,79,255,.025);padding:8px;display:flex;flex-direction:column;gap:6px}.pick-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:9px;padding:8px 10px;font-size:12px;color:var(--muted)}.pick-row strong{color:var(--text)}.pick-meta{font-size:11px;color:var(--muted)}.pick-amount{font-weight:700;color:var(--accent);white-space:nowrap}.summary-editor small{display:block;color:var(--muted);font-size:11px;margin-top:6px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 28px}.filters button{background:#fff;border:1.5px solid var(--border);color:var(--muted);border-radius:999px;padding:8px 14px;font-family:inherit;font-size:12px;cursor:pointer}.filters button.active{color:var(--accent);border-color:var(--accent);background:rgba(185,79,255,.07)}
.section-title{display:flex;align-items:center;gap:10px;margin:34px 0 14px}.section-title h2{font-family:"Instrument Serif",serif;font-style:italic;font-size:24px;margin:0}.line{height:1.5px;background:var(--border);flex:1}.pill{font-size:11px;color:var(--muted);background:rgba(185,79,255,.07);border:1px solid var(--border);padding:3px 10px;border-radius:999px}
.list{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:0 8px 28px rgba(185,79,255,.06);position:relative;overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--accent),var(--accent2));opacity:.7}.card.overdue{border-color:rgba(240,68,104,.35)}.card.overdue:before{background:var(--red)}.card.urgent{border-color:rgba(217,139,0,.35)}.card.urgent:before{background:var(--yellow)}
.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.brand{font-weight:700;font-size:16px;flex:1;min-width:140px}.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(185,79,255,.09);color:var(--accent);border:1px solid rgba(185,79,255,.22)}.pay{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(155,127,192,.25);color:var(--muted);background:rgba(155,127,192,.08)}
.meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:13px}.mi{display:flex;flex-direction:column;gap:3px}.ml{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}.mv{font-size:13px}.red{color:var(--red)}.yellow{color:var(--yellow)}.green{color:var(--green)}
.notes{margin-top:12px;background:rgba(185,79,255,.045);border-left:2px solid rgba(185,79,255,.25);border-radius:9px;padding:10px 12px;color:var(--muted);font-size:12.5px;line-height:1.55;white-space:pre-wrap}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.links a,.brief-btn{border:1px solid rgba(47,128,237,.24);background:rgba(47,128,237,.08);color:var(--blue);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;text-decoration:none}
.pay-row{display:flex;align-items:center;gap:12px}.amount{font-family:"Instrument Serif",serif;font-size:22px;font-style:italic;color:var(--accent);white-space:nowrap}.pay-groups{display:grid;grid-template-columns:1fr 1fr;gap:12px}.pay-group{display:flex;flex-direction:column;gap:10px}.group-head{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}.step{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(155,127,192,.25);background:rgba(155,127,192,.08);color:var(--muted)}.step.need{border-color:rgba(217,139,0,.28);background:rgba(217,139,0,.08);color:var(--yellow)}.step.wait{border-color:rgba(0,184,132,.28);background:rgba(0,184,132,.08);color:var(--green)}.money-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.money-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 8px 28px rgba(185,79,255,.06)}.money-card.wide{grid-column:1/-1}.money-head{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:10px}.money-title{font-weight:700}.money-sub{font-size:12px;color:var(--muted);margin-top:3px}.money-total{font-family:"Instrument Serif",serif;font-size:24px;font-style:italic;color:var(--accent);white-space:nowrap}.mini-list{display:flex;flex-direction:column;gap:7px}.mini-row{font-size:12.5px;color:var(--muted);line-height:1.45}.mini-row strong{color:var(--text)}.contract-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.contract-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:0 8px 28px rgba(185,79,255,.06);position:relative;overflow:hidden}.contract-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--green),var(--blue));opacity:.75}.contract-body{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.contract-box{background:rgba(185,79,255,.045);border:1px solid var(--border);border-radius:10px;padding:10px 12px}.contract-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.contract-value{font-family:"Instrument Serif",serif;font-size:22px;font-style:italic;color:var(--accent);margin-top:4px;line-height:1}.contract-note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.35}.empty,.loading{text-align:center;color:var(--muted);padding:42px 20px;background:#fff;border:1.5px solid var(--border);border-radius:14px}.toast{position:fixed;right:22px;bottom:22px;background:#fff;border:1.5px solid var(--border);box-shadow:0 14px 38px rgba(185,79,255,.18);border-radius:12px;padding:12px 16px;color:var(--text);display:none}.toast.show{display:block}
.modal{position:fixed;inset:0;background:rgba(45,31,61,.22);display:none;align-items:center;justify-content:center;padding:18px;z-index:30}.modal.show{display:flex}.modal-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;box-shadow:0 20px 60px rgba(45,31,61,.22);max-width:720px;width:100%;padding:18px}.modal-card h2{font-family:"Instrument Serif",serif;font-style:italic;font-size:26px;margin:0 0 12px}.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.edit-grid label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.edit-grid input,.edit-grid textarea{width:100%;margin-top:4px;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:inherit;color:var(--text)}.edit-grid textarea{min-height:90px;resize:vertical;grid-column:1/-1}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}.modal-actions button{border:1.5px solid var(--border);border-radius:999px;padding:8px 14px;background:#fff;color:var(--muted);font-family:inherit;font-weight:700;cursor:pointer}.modal-actions button.primary{border-color:var(--accent);background:rgba(185,79,255,.08);color:var(--accent)}
@media(max-width:680px){.wrap{padding:30px 14px 70px}header{align-items:start;flex-direction:column}.stats,.money-grid,.contract-grid{grid-template-columns:repeat(2,1fr)}.add-grid,.preview-grid,.month-summary-grid,.edit-grid{grid-template-columns:1fr}.pay-row{align-items:flex-start;flex-direction:column}.amount{font-size:20px}}
@media(max-width:620px){.money-grid,.contract-grid,.pay-groups{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1>Coco's <span>Job List</span></h1><div class="date" id="today"></div></div>
    <a class="sheet-link" target="_blank" href="https://docs.google.com/spreadsheets/d/1g4WrajznttzKNvLmfUZD6aG8JDvjYXIqdOwZVHi062c/edit">Open Google Sheet</a>
  </header>
  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">-</div><div class="label">Active Jobs</div></div>
    <div class="stat"><div class="num red" id="statOverdue">-</div><div class="label">Overdue</div></div>
    <div class="stat"><div class="num yellow" id="statUrgent">-</div><div class="label">Due Soon <=7d</div></div>
    <div class="stat"><div class="num" id="statUnpaid">-</div><div class="label">Unpaid</div></div>
  </div>
  <section class="quick-add">
    <h2>＋ Add New Job</h2>
    <div class="add-grid">
      <input id="quickJobText" placeholder="Brand + deliverables, e.g. Kerastase IGS + IGR / Ulike IGCP + IGS">
      <input id="quickJobDate" placeholder="Post date, e.g. 2026-06-09 or 9/6">
      <input id="quickJobFee" placeholder="Fee, e.g. RM16000">
    </div>
    <div class="add-actions">
      <button class="primary" id="quickPreviewBtn" type="button">Preview</button>
      <button id="quickClearBtn" type="button">Clear</button>
    </div>
    <div class="add-preview" id="quickPreview"></div>
  </section>
  <div class="month-summary-grid">
    <section class="summary-card" id="receivedCard"></section>
    <section class="summary-card" id="dealsCard"></section>
  </div>
  <div class="section-title"><h2>✦ Annual Endorsements</h2><div class="line"></div><span class="pill">Consmy + Love Maya</span></div>
  <div class="contract-grid" id="contractList"></div>
  <div class="filters" id="filters">
    <button class="active" data-filter="all">All</button><button data-filter="overdue">Overdue</button><button data-filter="urgent">Due Soon</button><button data-filter="unpaid">Unpaid</button><button data-filter="IGR">IGR</button><button data-filter="IGS">IGS</button><button data-filter="IGP">IGP</button><button data-filter="TT">TT</button>
  </div>
  <div class="section-title"><h2>✦ Active Jobs</h2><div class="line"></div><span class="pill" id="jobCount">-</span></div>
  <div class="list" id="jobList"><div class="loading">Loading jobs...</div></div>
  <div class="section-title"><h2>💰 Payment Watch</h2><div class="line"></div><span class="pill" id="payCount">-</span></div>
  <div class="list" id="payList"><div class="loading">Loading payments...</div></div>
</div>
<div class="modal" id="editModal">
  <div class="modal-card">
    <h2>Edit Item</h2>
    <div class="edit-grid">
      <label>Brand<input id="editBrand"></label>
      <label>Campaign<input id="editCampaign"></label>
      <label>Deliverables<input id="editType"></label>
      <label>Post Date<input id="editPostDue"></label>
      <label>Fee<input id="editFee"></label>
      <label>Payment Status<input id="editPayStatus"></label>
      <label>Invoice Status<input id="editInvoice"></label>
      <label>Completed<input id="editCompleted" placeholder="true / false"></label>
      <label style="grid-column:1/-1">Notes<textarea id="editNotes"></textarea></label>
    </div>
    <div class="modal-actions">
      <button id="editCancel" type="button">Cancel</button>
      <button class="primary" id="editSave" type="button">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/1g4WrajznttzKNvLmfUZD6aG8JDvjYXIqdOwZVHi062c/gviz/tq?tqx=out:csv&sheet=Jobs%20Database";
const today=new Date();today.setHours(0,0,0,0);let sheetData=[],allData=[],allJobs=[],payments=[],filter="all",pendingQuickJob=null,editingKey=null;
const LOCAL_JOBS_KEY="coco_quick_added_jobs_v1";
const EDIT_OVERRIDES_KEY="coco_job_edit_overrides_v1";
const SUMMARY_KEY="coco_month_summary_v1";
const DELETED_ITEMS_KEY="coco_deleted_items_v1";
const STATUS_UPDATES=[
  {match:"Hada Labo",notes:"Draft submitted · Post 2026-06-03",completed:false},
  {match:"Rejuran",notes:"Draft submitted · Post 2026-06-06 · Payment within 30 business days from posting",completed:false},
  {match:"Gentle Monster",notes:"Posted · Opening / unboxing IGR",completed:true},
  {match:"ULIKE|1 Jun Event",notes:"Draft submitted · IGCP + IGS · Event 2026-06-01",completed:false},
  {match:"Returnity",notes:"Posted · Invoice sent · Waiting client payment",completed:true,invoice_status:"Invoice Sent"}
];
const MANUAL_PAYMENT_WATCH=[
  {brand:"VIVAIA",campaign:"",payment_amount:"10000",payment_status:"Pending",notes:"Payment not received",is_payment:true},
  {brand:"PROYA",campaign:"",payment_amount:"47000",payment_status:"Pending",notes:"Payment not received",is_payment:true}
];
const ENDORSEMENTS=[
  {brand:"Love Maya",term:"1-year endorsement · quarterly",receivedLabel:"Q1 paid",receivedAmount:"RM 20,000",nextLabel:"Q2 due after Jun",nextAmount:"RM 20,000",note:"Waiting Q2 payment in Jul"},
  {brand:"Consmy",term:"1-year endorsement · quarterly",receivedLabel:"Q1 + Q2 paid",receivedAmount:"RM 57,500",nextLabel:"Q3 next",nextAmount:"RM 28,750",note:"Fixed quarterly fee"}
];
const SUMMARY_DEFAULTS={
  received:{title:"Money Received This Month",sub:"May 2026",matches:["love maya","jisulife"]},
  deals:{title:"Deals Closed This Month",sub:"June 2026",matches:["kerastase","ulike","kiehl","gentle monster"]}
};
document.querySelector("#today").textContent=today.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function csv(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c=='"'&&q&&n=='"'){cell+='"';i++}else if(c=='"')q=!q;else if(c==","&&!q){row.push(cell);cell=""}else if((c=="\n"||c=="\r")&&!q){if(c=="\r"&&n=="\n")i++;row.push(cell);rows.push(row);row=[];cell=""}else cell+=c}if(cell||row.length){row.push(cell);rows.push(row)}return rows.filter(r=>r.some(v=>String(v).trim()))}
function bool(v){return["true","yes","1","done","completed"].includes(String(v||"").trim().toLowerCase())}
function dateDiff(d){if(!d)return null;const x=new Date(d);if(Number.isNaN(+x))return null;x.setHours(0,0,0,0);return Math.round((x-today)/86400000)}
function fmt(d){if(!d)return "-";const x=new Date(d);return Number.isNaN(+x)?d:x.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
function dueText(d){const n=dateDiff(d);if(n===null)return["",""];if(n<0)return[`${Math.abs(n)}d overdue`,"red"];if(n===0)return["Today","yellow"];if(n<=7)return[`${n}d left`,"yellow"];return[`${n}d left`,"green"]}
function money(v){const n=Number(String(v||"").replace(/[^0-9.]/g,""));return n?`RM ${n.toLocaleString("en-MY",{maximumFractionDigits:0})}`:""}
function moneyLabel(v,notes=""){const n=Number(String(v||"").replace(/[^0-9.]/g,""));if(!n)return"";const cur=String(notes||"").toUpperCase().includes("USD")?"USD":"RM";return`${cur} ${n.toLocaleString("en-MY",{maximumFractionDigits:0})}`}
function parseMoneyAmount(label){const n=Number(String(label||"").replace(/[^0-9.]/g,""));return n||0}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function normalize(r,i){return{id:i+1,edit_key:r.edit_key||"",status:r.status||"",brand:r.brand||"",campaign:r.campaign||"",content_type:r.content_type||r.deliverables||"OTHER",deliverables:r.deliverables||"",brief_url:r.brief_url||"",brief_text:r.brief_text||"",storyline_due:r.storyline_due||"",draft_due:r.draft_due||"",post_due:r.post_due||"",payment_amount:r.payment_amount||"",payment_status:r.payment_status||"Pending",payday:r.payday||"",invoice_status:r.invoice_status||"",payment_notes:r.payment_notes||"",notes:r.notes||r.shoot_notes||"",hashtags:r.hashtags||"",completed:bool(r.completed)||String(r.status||"").toLowerCase()==="completed",is_payment:bool(r.is_payment),local_only:bool(r.local_only),posting_link:r.posting_link||"",video_link:r.video_link||""}}
function itemKey(j){return j.edit_key||[j.brand,j.campaign,j.post_due,j.content_type,j.is_payment?"payment":"job"].map(x=>String(x||"").toLowerCase().trim()).join("|")}
function editOverrides(){try{return JSON.parse(localStorage.getItem(EDIT_OVERRIDES_KEY)||"{}")}catch(e){return{}}}
function saveEditOverride(key,updates){const o=editOverrides();o[key]={...updates,edit_key:key};localStorage.setItem(EDIT_OVERRIDES_KEY,JSON.stringify(o))}
function applyEditOverrides(data){const o=editOverrides();return data.map(j=>o[itemKey(j)]?normalize({...j,...o[itemKey(j)],edit_key:itemKey(j)},j.id):j)}
function deletedKeys(){try{return JSON.parse(localStorage.getItem(DELETED_ITEMS_KEY)||"[]")}catch(e){return[]}}
function saveDeletedKey(key){const keys=[...new Set(deletedKeys().concat(key))];localStorage.setItem(DELETED_ITEMS_KEY,JSON.stringify(keys))}
function removeDeletedItems(data){const keys=new Set(deletedKeys());return data.filter(j=>!keys.has(itemKey(j)))}
function applyUpdates(data){return data.map(j=>{const key=`${j.brand} ${j.campaign}`.toLowerCase();const u=STATUS_UPDATES.find(x=>x.match.split("|").every(m=>key.includes(m.toLowerCase())));if(!u)return j;return{...j,notes:u.notes,completed:u.completed,invoice_status:u.invoice_status||j.invoice_status}})}
function addManualPaymentWatch(data){const existing=data.map(j=>j.brand.toLowerCase());const extras=MANUAL_PAYMENT_WATCH.filter(j=>!existing.includes(j.brand.toLowerCase())).map((j,i)=>normalize(j,data.length+i));return data.concat(extras)}
function localJobs(){try{return JSON.parse(localStorage.getItem(LOCAL_JOBS_KEY)||"[]").map((j,i)=>normalize({...j,local_only:true},i))}catch(e){return[]}}
function saveLocalJob(job){const jobs=localJobs().map(j=>({...j,id:undefined}));jobs.push({...job,local_only:true});localStorage.setItem(LOCAL_JOBS_KEY,JSON.stringify(jobs))}
function rebuildData(data){allData=removeDeletedItems(applyEditOverrides(addManualPaymentWatch(applyUpdates(data.concat(localJobs())))));allJobs=allData.filter(j=>!j.completed&&!j.is_payment).sort((a,b)=>(a.post_due||"9999").localeCompare(b.post_due||"9999"));payments=allData.filter(j=>(j.is_payment||j.completed||money(j.payment_amount))&&j.payment_status!=="Completed")}
async function load(){const res=await fetch(SHEET_CSV_URL+"&cache="+Date.now());if(!res.ok)throw new Error("Google Sheet connection failed");const rows=csv(await res.text()),heads=rows.shift().map(h=>h.trim());sheetData=rows.map((v,i)=>{const r={};heads.forEach((h,j)=>{if(h)r[h]=v[j]||""});return normalize(r,i)}).filter(j=>j.brand);rebuildData(sheetData);render()}
function render(){const jobs=filtered();document.querySelector("#statTotal").textContent=allJobs.length;document.querySelector("#statOverdue").textContent=allJobs.filter(j=>dateDiff(j.post_due)<0).length;document.querySelector("#statUrgent").textContent=allJobs.filter(j=>{const d=dateDiff(j.post_due);return d!==null&&d>=0&&d<=7}).length;document.querySelector("#statUnpaid").textContent=payments.length;document.querySelector("#jobCount").textContent=`${jobs.length} jobs`;document.querySelector("#payCount").textContent=`${payments.length} pending`;renderMonthSummaries();renderContracts();renderJobs(jobs);renderPay()}
function filtered(){let j=[...allJobs];if(filter==="overdue")j=j.filter(x=>dateDiff(x.post_due)<0);else if(filter==="urgent")j=j.filter(x=>{const d=dateDiff(x.post_due);return d!==null&&d>=0&&d<=7});else if(filter==="unpaid")j=j.filter(x=>x.payment_status!=="Completed"&&money(x.payment_amount));else if(["IGR","IGS","IGP","TT"].includes(filter))j=j.filter(x=>String(x.content_type).includes(filter));return j}
function renderJobs(jobs){const el=document.querySelector("#jobList");if(!jobs.length){el.innerHTML='<div class="empty">All clear. No jobs here.</div>';return}el.innerHTML=jobs.map(j=>{const [pt,pc]=dueText(j.post_due),[st,sc]=dueText(j.storyline_due),[dt,dc]=dueText(j.draft_due);const cls=dateDiff(j.post_due)<0?"overdue":dateDiff(j.post_due)<=7&&dateDiff(j.post_due)!==null?"urgent":"";return`<article class="card ${cls}"><div class="top"><div class="brand">${esc(j.brand)}${j.campaign?` <span style="color:var(--muted);font-weight:500">- ${esc(j.campaign)}</span>`:""}</div><span class="tag">${esc(j.content_type)}</span><span class="pay">${esc(j.payment_status)}</span><label class="done-toggle"><input type="checkbox" data-complete-key="${esc(itemKey(j))}"> Done</label><button class="edit-btn" data-edit-key="${esc(itemKey(j))}" type="button">Edit</button><button class="delete-btn" data-delete-key="${esc(itemKey(j))}" type="button">Delete</button></div><div class="meta">${j.storyline_due?`<div class="mi"><span class="ml">Storyline</span><span class="mv ${sc}">${fmt(j.storyline_due)} (${st})</span></div>`:""}${j.draft_due?`<div class="mi"><span class="ml">Draft</span><span class="mv ${dc}">${fmt(j.draft_due)} (${dt})</span></div>`:""}<div class="mi"><span class="ml">Post Due</span><span class="mv ${pc}">${fmt(j.post_due)}${pt?` (${pt})`:""}</span></div>${money(j.payment_amount)?`<div class="mi"><span class="ml">Payment</span><span class="mv">${money(j.payment_amount)}</span></div>`:""}</div>${j.notes?`<div class="notes">${esc(j.notes)}</div>`:""}<div class="links">${j.brief_url?`<a target="_blank" href="${esc(j.brief_url)}">Brief</a>`:""}${j.posting_link?`<a target="_blank" href="${esc(j.posting_link)}">Posting Link</a>`:""}${j.video_link?`<a target="_blank" href="${esc(j.video_link)}">Video Link</a>`:""}</div></article>`}).join("")}
function summarySelections(){try{return JSON.parse(localStorage.getItem(SUMMARY_KEY)||"{}")}catch(e){return{}}}
function saveSummarySelection(type,keys){const current=summarySelections();current[type]=keys;localStorage.setItem(SUMMARY_KEY,JSON.stringify(current))}
function defaultSummaryKeys(type){const cfg=SUMMARY_DEFAULTS[type]||{},matches=cfg.matches||[];return allData.filter(j=>matches.some(m=>`${j.brand} ${j.campaign}`.toLowerCase().includes(m))).map(itemKey)}
function selectedSummaryKeys(type){const saved=summarySelections()[type];return Array.isArray(saved)?saved:defaultSummaryKeys(type)}
function selectedSummaryItems(type){const keys=new Set(selectedSummaryKeys(type));return allData.filter(j=>keys.has(itemKey(j)))}
function itemAmount(j){return moneyLabel(j.payment_amount,[j.payment_notes,j.notes].join(" "))||"TBC"}
function itemDetail(j,type){if(type==="received")return j.payment_notes||j.notes||j.campaign||j.content_type||"Paid";return j.deliverables||j.content_type||j.campaign||j.notes||"Brand collaboration"}
function summaryTotal(items){const totals={},hasTbc=items.some(j=>!parseMoneyAmount(j.payment_amount));items.forEach(j=>{const n=parseMoneyAmount(j.payment_amount);if(!n)return;const cur=String([j.payment_notes,j.notes].join(" ")).toUpperCase().includes("USD")?"USD":"RM";totals[cur]=(totals[cur]||0)+n});const parts=Object.entries(totals).map(([cur,n])=>`${cur} ${n.toLocaleString("en-MY",{maximumFractionDigits:0})}`);if(hasTbc)parts.push("TBC");return parts.join(" / ")||"-"}
function summaryRowsHtmlFromItems(items,type){if(!items.length)return'<div class="mini-row">No jobs selected.</div>';return items.map(j=>`<div class="mini-row"><strong>${esc(j.brand)}</strong>${j.campaign?` - ${esc(j.campaign)}`:""} · ${esc(itemAmount(j))} · ${esc(itemDetail(j,type))}</div>`).join("")}
function pickerRowsHtml(type,selected){const keys=new Set(selected);const candidates=[...allData].sort((a,b)=>`${a.brand} ${a.campaign}`.localeCompare(`${b.brand} ${b.campaign}`));return candidates.map(j=>{const key=itemKey(j);return`<label class="pick-row"><input type="checkbox" data-summary-pick="${type}" value="${esc(key)}" ${keys.has(key)?"checked":""}><span><strong>${esc(j.brand)}</strong>${j.campaign?` - ${esc(j.campaign)}`:""}<div class="pick-meta">${esc(j.content_type)}${j.post_due?` · Post ${esc(j.post_due)}`:""} · ${esc(j.payment_status)}</div></span><span class="pick-amount">${esc(itemAmount(j))}</span></label>`}).join("")}
function renderSummaryCard(type,elId){const cfg=SUMMARY_DEFAULTS[type],selected=selectedSummaryKeys(type),items=selectedSummaryItems(type);document.querySelector(elId).innerHTML=`<div class="summary-head"><div><div class="summary-title">${esc(cfg.title)}</div><div class="summary-sub">${esc(cfg.sub)}</div></div><div><div class="summary-total">${esc(summaryTotal(items))}</div><button class="mini-edit" data-summary-edit="${type}" type="button">Select</button></div></div><div class="mini-list">${summaryRowsHtmlFromItems(items,type)}</div><div class="summary-editor" id="summaryEditor-${type}"><div class="summary-picker">${pickerRowsHtml(type,selected)}</div><small>先在 Add New Job / Active Jobs 里面新增或编辑 job，再来这里勾选进 summary。</small><div class="add-actions"><button class="primary" data-summary-save="${type}" type="button">Save Selection</button></div></div>`}
function renderMonthSummaries(){renderSummaryCard("received","#receivedCard");renderSummaryCard("deals","#dealsCard")}
function renderContracts(){document.querySelector("#contractList").innerHTML=ENDORSEMENTS.map(c=>`<article class="contract-card"><div class="top"><div class="brand">${esc(c.brand)}</div><span class="tag">Endorsement</span></div><div class="contract-note">${esc(c.term)}</div><div class="contract-body"><div class="contract-box"><div class="contract-label">${esc(c.receivedLabel)}</div><div class="contract-value">${esc(c.receivedAmount)}</div></div><div class="contract-box"><div class="contract-label">${esc(c.nextLabel)}</div><div class="contract-value">${esc(c.nextAmount)}</div></div></div><div class="contract-note">${esc(c.note)}</div></article>`).join("")}
function invoiceStep(j){const s=String([j.invoice_status,j.payment_notes,j.notes].join(" ")).toLowerCase();if(s.includes("invoice sent")||s.includes("invoice issued")||s.includes("已发invoice")||s.includes("给了invoice"))return"wait";return"need"}
function renderPayCard(j){const step=invoiceStep(j),stepText=step==="wait"?"Invoice sent · waiting client":"Need invoice";return`<article class="card"><div class="pay-row"><div class="brand">${esc(j.brand)}${j.campaign?` <span style="color:var(--muted);font-weight:500">- ${esc(j.campaign)}</span>`:""}</div><div class="amount">${moneyLabel(j.payment_amount,[j.payment_notes,j.notes].join(" "))||"Amount TBC"}</div><span class="step ${step}">${stepText}</span><label class="invoice-toggle"><input type="checkbox" data-invoice-key="${esc(itemKey(j))}" ${step==="wait"?"checked":""}> Invoice sent</label><button class="edit-btn" data-edit-key="${esc(itemKey(j))}" type="button">Edit</button><button class="delete-btn" data-delete-key="${esc(itemKey(j))}" type="button">Delete</button></div><div class="notes">${step==="wait"?"钱还没进来，等客人付款。":"钱还没进来，下一步先发 invoice。"}${j.payment_notes||j.notes?`<br>${esc([j.payment_notes,j.notes].filter(Boolean).join(" · "))}`:""}</div></article>`}
function renderPay(){const el=document.querySelector("#payList");const p=[...payments];if(!p.length){el.innerHTML='<div class="empty">No payment items.</div>';return}const need=p.filter(j=>invoiceStep(j)==="need"),wait=p.filter(j=>invoiceStep(j)==="wait");el.innerHTML=`<div class="pay-groups"><section class="pay-group"><div class="group-head"><span>Need invoice</span><span>${need.length}</span></div>${need.length?need.map(renderPayCard).join(""):'<div class="empty">No invoice pending.</div>'}</section><section class="pay-group"><div class="group-head"><span>Invoice sent / waiting client</span><span>${wait.length}</span></div>${wait.length?wait.map(renderPayCard).join(""):'<div class="empty">No client-payment waiting.</div>'}</section></div>`}
function normalizeType(t){const s=String(t||"").toUpperCase().replace(/\s+/g,"");if(s.startsWith("IGS"))return"IGS";if(s==="IGR"||s.startsWith("REEL"))return"IGR";if(s==="IGCP")return"IGCP";if(s==="TT"||s==="TIKTOK")return"TT";if(s.startsWith("STOR"))return"IGS";return s}
function parsePostDate(v){const s=String(v||"").trim();if(!s)return"";if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){const [y,m,d]=s.split("-").map(Number);return`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`}const m=s.match(/^(\d{1,2})[\/.-](\d{1,2})(?:[\/.-](\d{2,4}))?$/);if(!m)return s;const day=Number(m[1]),month=Number(m[2]),year=m[3]?Number(m[3].length===2?`20${m[3]}`:m[3]):today.getFullYear();return`${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`}
function parseQuickJob(){const raw=document.querySelector("#quickJobText").value.trim(),date=parsePostDate(document.querySelector("#quickJobDate").value),fee=document.querySelector("#quickJobFee").value.trim();const warnings=[];if(!raw)return{error:"先输入品牌和 deliverables。"};const typeMatches=raw.match(/\b(IGR|IGS+|IGCP|TT|TIKTOK|REELS?|STOR(?:Y|IES))\b/gi)||[];const types=[...new Set(typeMatches.map(normalizeType))].filter(Boolean);let brand=raw.replace(/\b(IGR|IGS+|IGCP|TT|TIKTOK|REELS?|STOR(?:Y|IES))\b/gi," ").replace(/[+,&/()]/g," ").replace(/\s+/g," ").trim();if(!brand)brand=raw;if(!types.length)warnings.push("Deliverables 没抓到，先用 OTHER。");if(!date)warnings.push("Post date 还没填。");if(!fee)warnings.push("Fee 还没填。");const amount=String(fee).replace(/[^0-9.]/g,"");return{job:{status:"Active",brand,campaign:"",content_type:types.join(" + ")||"OTHER",deliverables:types.join(" + ")||"OTHER",post_due:date,payment_amount:amount,payment_status:"Pending",notes:"Added from website quick add",source:"Website quick add",local_only:true},warnings}}
function previewQuickJob(){const box=document.querySelector("#quickPreview"),parsed=parseQuickJob();if(parsed.error){box.className="add-preview show";box.innerHTML=`<div class="preview-warn">${esc(parsed.error)}</div>`;pendingQuickJob=null;return}pendingQuickJob=parsed.job;const j=parsed.job;box.className="add-preview show";box.innerHTML=`<strong>Preview</strong><div class="preview-grid"><div class="preview-box"><div class="preview-label">Brand</div><div class="preview-value">${esc(j.brand)}</div></div><div class="preview-box"><div class="preview-label">Deliverables</div><div class="preview-value">${esc(j.content_type)}</div></div><div class="preview-box"><div class="preview-label">Post Date</div><div class="preview-value">${esc(j.post_due||"-")}</div></div><div class="preview-box"><div class="preview-label">Fee</div><div class="preview-value">${moneyLabel(j.payment_amount)||"-"}</div></div></div>${parsed.warnings.length?`<div class="preview-warn">${parsed.warnings.map(esc).join(" · ")}</div>`:""}<div class="add-actions"><button class="primary" id="quickConfirmBtn" type="button">Confirm Add</button></div>`;document.querySelector("#quickConfirmBtn").addEventListener("click",confirmQuickJob)}
function clearQuickJob(){["#quickJobText","#quickJobDate","#quickJobFee"].forEach(s=>document.querySelector(s).value="");pendingQuickJob=null;const box=document.querySelector("#quickPreview");box.className="add-preview";box.innerHTML=""}
function confirmQuickJob(){if(!pendingQuickJob)return;saveLocalJob(pendingQuickJob);rebuildData(sheetData);render();clearQuickJob();const t=document.querySelector("#toast");t.textContent="Job added to this website browser.";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}
function showToast(msg){const t=document.querySelector("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}
function markComplete(key){saveEditOverride(key,{completed:true,payment_status:"Pending"});rebuildData(sheetData);render();showToast("Moved to Payment Watch.")}
function deleteItem(key){if(!confirm("Delete this job from this browser view?"))return;saveDeletedKey(key);rebuildData(sheetData);render();showToast("Deleted from this browser view.")}
function cleanInvoiceNotes(notes,sent){const text=String(notes||"");if(sent)return text;return text.replace(/invoice sent/gi,"Invoice pending").replace(/invoice issued/gi,"Invoice pending").replace(/给了invoice/g,"还没给invoice").replace(/已发invoice/g,"还没发invoice")}
function setInvoiceSent(key,sent){const j=allData.find(x=>itemKey(x)===key)||{};saveEditOverride(key,{invoice_status:sent?"Invoice Sent":"",notes:cleanInvoiceNotes(j.notes,sent)});rebuildData(sheetData);render();showToast(sent?"Invoice marked sent.":"Moved back to Need invoice.")}
function toggleSummaryEditor(type){document.querySelector(`#summaryEditor-${type}`).classList.toggle("show")}
function saveSummaryEditor(type){const keys=[...document.querySelectorAll(`[data-summary-pick="${type}"]:checked`)].map(x=>x.value);saveSummarySelection(type,keys);renderMonthSummaries();showToast("Summary selection saved in this browser.")}
function openEditItem(key){const j=allData.find(x=>itemKey(x)===key);if(!j)return;editingKey=key;document.querySelector("#editBrand").value=j.brand;document.querySelector("#editCampaign").value=j.campaign;document.querySelector("#editType").value=j.content_type;document.querySelector("#editPostDue").value=j.post_due;document.querySelector("#editFee").value=j.payment_amount;document.querySelector("#editPayStatus").value=j.payment_status;document.querySelector("#editInvoice").value=j.invoice_status;document.querySelector("#editCompleted").value=j.completed?"true":"false";document.querySelector("#editNotes").value=j.notes;document.querySelector("#editModal").classList.add("show")}
function closeEditItem(){editingKey=null;document.querySelector("#editModal").classList.remove("show")}
function saveEditItem(){if(!editingKey)return;saveEditOverride(editingKey,{brand:document.querySelector("#editBrand").value.trim(),campaign:document.querySelector("#editCampaign").value.trim(),content_type:document.querySelector("#editType").value.trim(),deliverables:document.querySelector("#editType").value.trim(),post_due:parsePostDate(document.querySelector("#editPostDue").value.trim()),payment_amount:document.querySelector("#editFee").value.replace(/[^0-9.]/g,""),payment_status:document.querySelector("#editPayStatus").value.trim()||"Pending",invoice_status:document.querySelector("#editInvoice").value.trim(),completed:bool(document.querySelector("#editCompleted").value),notes:document.querySelector("#editNotes").value.trim()});rebuildData(sheetData);render();closeEditItem();showToast("Item edited in this browser.")}
document.querySelector("#quickPreviewBtn").addEventListener("click",previewQuickJob);
document.querySelector("#quickClearBtn").addEventListener("click",clearQuickJob);
document.querySelector("#editCancel").addEventListener("click",closeEditItem);
document.querySelector("#editSave").addEventListener("click",saveEditItem);
document.querySelector("#editModal").addEventListener("click",e=>{if(e.target.id==="editModal")closeEditItem()});
document.addEventListener("change",e=>{const done=e.target.closest("[data-complete-key]");if(done&&done.checked){markComplete(done.dataset.completeKey);return}const invoice=e.target.closest("[data-invoice-key]");if(invoice){setInvoiceSent(invoice.dataset.invoiceKey,invoice.checked)}});
document.addEventListener("click",e=>{const del=e.target.closest("[data-delete-key]");if(del){deleteItem(del.dataset.deleteKey);return}const edit=e.target.closest("[data-edit-key]");if(edit){openEditItem(edit.dataset.editKey);return}const sumEdit=e.target.closest("[data-summary-edit]");if(sumEdit){toggleSummaryEditor(sumEdit.dataset.summaryEdit);return}const sumSave=e.target.closest("[data-summary-save]");if(sumSave){saveSummaryEditor(sumSave.dataset.summarySave)}});
document.querySelector("#filters").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;filter=b.dataset.filter;document.querySelectorAll("#filters button").forEach(x=>x.classList.remove("active"));b.classList.add("active");render()});
load().catch(e=>{rebuildData([]);render();document.querySelector("#jobList").insertAdjacentHTML("afterbegin",`<div class="empty">Connection error: ${esc(e.message)}. Showing local jobs only.</div>`);document.querySelector("#payList").innerHTML='<div class="empty">Google Sheet 暂时读不到。</div>'});
</script>
</body>
</html>
