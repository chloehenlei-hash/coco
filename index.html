<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Coco's Job List</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf6ff;--card:#fff;--text:#2d1f3d;--muted:#9b7fc0;--accent:#b94fff;--accent2:#ff5fa0;--green:#00b884;--yellow:#d98b00;--red:#f04468;--blue:#2f80ed;--border:rgba(180,100,255,.16)}
*{box-sizing:border-box}body{margin:0;font-family:"DM Sans",sans-serif;background:radial-gradient(ellipse 70% 40% at 20% 0%,rgba(255,95,160,.09),transparent),radial-gradient(ellipse 60% 40% at 80% 10%,rgba(185,79,255,.1),transparent),var(--bg);color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:42px 22px 80px}header{display:flex;justify-content:space-between;gap:18px;align-items:end;border-bottom:1.5px solid var(--border);padding-bottom:28px;margin-bottom:28px}
h1{font-family:"Instrument Serif",serif;font-style:italic;font-size:40px;margin:0;line-height:1}h1 span{color:var(--accent)}.date{font-size:13px;color:var(--muted);margin-top:6px}
.sheet-link{border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;background:#fff;color:var(--accent);text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:26px 0}.stat{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:0 8px 28px rgba(185,79,255,.06)}.num{font-family:"Instrument Serif",serif;font-size:30px;font-style:italic}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 28px}.filters button{background:#fff;border:1.5px solid var(--border);color:var(--muted);border-radius:999px;padding:8px 14px;font-family:inherit;font-size:12px;cursor:pointer}.filters button.active{color:var(--accent);border-color:var(--accent);background:rgba(185,79,255,.07)}
.section-title{display:flex;align-items:center;gap:10px;margin:34px 0 14px}.section-title h2{font-family:"Instrument Serif",serif;font-style:italic;font-size:24px;margin:0}.line{height:1.5px;background:var(--border);flex:1}.pill{font-size:11px;color:var(--muted);background:rgba(185,79,255,.07);border:1px solid var(--border);padding:3px 10px;border-radius:999px}
.list{display:flex;flex-direction:column;gap:10px}.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:0 8px 28px rgba(185,79,255,.06);position:relative;overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--accent),var(--accent2));opacity:.7}.card.overdue{border-color:rgba(240,68,104,.35)}.card.overdue:before{background:var(--red)}.card.urgent{border-color:rgba(217,139,0,.35)}.card.urgent:before{background:var(--yellow)}
.top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.brand{font-weight:700;font-size:16px;flex:1;min-width:140px}.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(185,79,255,.09);color:var(--accent);border:1px solid rgba(185,79,255,.22)}.pay{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(155,127,192,.25);color:var(--muted);background:rgba(155,127,192,.08)}
.meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:13px}.mi{display:flex;flex-direction:column;gap:3px}.ml{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}.mv{font-size:13px}.red{color:var(--red)}.yellow{color:var(--yellow)}.green{color:var(--green)}
.notes{margin-top:12px;background:rgba(185,79,255,.045);border-left:2px solid rgba(185,79,255,.25);border-radius:9px;padding:10px 12px;color:var(--muted);font-size:12.5px;line-height:1.55;white-space:pre-wrap}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.links a,.brief-btn{border:1px solid rgba(47,128,237,.24);background:rgba(47,128,237,.08);color:var(--blue);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;text-decoration:none}
.pay-row{display:flex;align-items:center;gap:12px}.amount{font-family:"Instrument Serif",serif;font-size:22px;font-style:italic;color:var(--accent);white-space:nowrap}.empty,.loading{text-align:center;color:var(--muted);padding:42px 20px;background:#fff;border:1.5px solid var(--border);border-radius:14px}.toast{position:fixed;right:22px;bottom:22px;background:#fff;border:1.5px solid var(--border);box-shadow:0 14px 38px rgba(185,79,255,.18);border-radius:12px;padding:12px 16px;color:var(--text);display:none}.toast.show{display:block}
@media(max-width:680px){.wrap{padding:30px 14px 70px}header{align-items:start;flex-direction:column}.stats{grid-template-columns:repeat(2,1fr)}.pay-row{align-items:flex-start;flex-direction:column}.amount{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1>Coco's <span>Job List</span></h1><div class="date" id="today"></div></div>
    <a class="sheet-link" target="_blank" href="https://docs.google.com/spreadsheets/d/1g4WrajznttzKNvLmfUZD6aG8JDvjYXIqdOwZVHi062c/edit">Open Google Sheet</a>
  </header>
  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">-</div><div class="label">Active Jobs</div></div>
    <div class="stat"><div class="num red" id="statOverdue">-</div><div class="label">Overdue</div></div>
    <div class="stat"><div class="num yellow" id="statUrgent">-</div><div class="label">Due Soon <=7d</div></div>
    <div class="stat"><div class="num" id="statUnpaid">-</div><div class="label">Unpaid</div></div>
  </div>
  <div class="filters" id="filters">
    <button class="active" data-filter="all">All</button><button data-filter="overdue">Overdue</button><button data-filter="urgent">Due Soon</button><button data-filter="unpaid">Unpaid</button><button data-filter="IGR">IGR</button><button data-filter="IGS">IGS</button><button data-filter="IGP">IGP</button><button data-filter="TT">TT</button>
  </div>
  <div class="section-title"><h2>✦ Active Jobs</h2><div class="line"></div><span class="pill" id="jobCount">-</span></div>
  <div class="list" id="jobList"><div class="loading">Loading jobs...</div></div>
  <div class="section-title"><h2>💰 Payment Watch</h2><div class="line"></div><span class="pill" id="payCount">-</span></div>
  <div class="list" id="payList"><div class="loading">Loading payments...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/1g4WrajznttzKNvLmfUZD6aG8JDvjYXIqdOwZVHi062c/gviz/tq?tqx=out:csv&sheet=Jobs%20Database";
const today=new Date();today.setHours(0,0,0,0);let allJobs=[],payments=[],filter="all";
document.querySelector("#today").textContent=today.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function csv(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c=='"'&&q&&n=='"'){cell+='"';i++}else if(c=='"')q=!q;else if(c==","&&!q){row.push(cell);cell=""}else if((c=="\n"||c=="\r")&&!q){if(c=="\r"&&n=="\n")i++;row.push(cell);rows.push(row);row=[];cell=""}else cell+=c}if(cell||row.length){row.push(cell);rows.push(row)}return rows.filter(r=>r.some(v=>String(v).trim()))}
function bool(v){return["true","yes","1","done","completed"].includes(String(v||"").trim().toLowerCase())}
function dateDiff(d){if(!d)return null;const x=new Date(d);if(Number.isNaN(+x))return null;x.setHours(0,0,0,0);return Math.round((x-today)/86400000)}
function fmt(d){if(!d)return "-";const x=new Date(d);return Number.isNaN(+x)?d:x.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
function dueText(d){const n=dateDiff(d);if(n===null)return["",""];if(n<0)return[`${Math.abs(n)}d overdue`,"red"];if(n===0)return["Today","yellow"];if(n<=7)return[`${n}d left`,"yellow"];return[`${n}d left`,"green"]}
function money(v){const n=Number(String(v||"").replace(/[^0-9.]/g,""));return n?`RM ${n.toLocaleString("en-MY",{maximumFractionDigits:0})}`:""}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function normalize(r,i){return{id:i+1,status:r.status||"",brand:r.brand||"",campaign:r.campaign||"",content_type:r.content_type||r.deliverables||"OTHER",deliverables:r.deliverables||"",brief_url:r.brief_url||"",brief_text:r.brief_text||"",storyline_due:r.storyline_due||"",draft_due:r.draft_due||"",post_due:r.post_due||"",payment_amount:r.payment_amount||"",payment_status:r.payment_status||"Pending",payday:r.payday||"",notes:r.notes||r.shoot_notes||"",hashtags:r.hashtags||"",completed:bool(r.completed)||String(r.status||"").toLowerCase()==="completed",is_payment:bool(r.is_payment),posting_link:r.posting_link||"",video_link:r.video_link||""}}
async function load(){const res=await fetch(SHEET_CSV_URL+"&cache="+Date.now());if(!res.ok)throw new Error("Google Sheet connection failed");const rows=csv(await res.text()),heads=rows.shift().map(h=>h.trim());const data=rows.map((v,i)=>{const r={};heads.forEach((h,j)=>{if(h)r[h]=v[j]||""});return normalize(r,i)}).filter(j=>j.brand);allJobs=data.filter(j=>!j.completed&&!j.is_payment).sort((a,b)=>(a.post_due||"9999").localeCompare(b.post_due||"9999"));payments=data.filter(j=>!j.completed&&(j.is_payment||money(j.payment_amount)));render()}
function render(){const jobs=filtered();document.querySelector("#statTotal").textContent=allJobs.length;document.querySelector("#statOverdue").textContent=allJobs.filter(j=>dateDiff(j.post_due)<0).length;document.querySelector("#statUrgent").textContent=allJobs.filter(j=>{const d=dateDiff(j.post_due);return d!==null&&d>=0&&d<=7}).length;document.querySelector("#statUnpaid").textContent=payments.filter(j=>j.payment_status!=="Completed").length;document.querySelector("#jobCount").textContent=`${jobs.length} jobs`;document.querySelector("#payCount").textContent=`${payments.length} pending`;renderJobs(jobs);renderPay()}
function filtered(){let j=[...allJobs];if(filter==="overdue")j=j.filter(x=>dateDiff(x.post_due)<0);else if(filter==="urgent")j=j.filter(x=>{const d=dateDiff(x.post_due);return d!==null&&d>=0&&d<=7});else if(filter==="unpaid")j=j.filter(x=>x.payment_status!=="Completed"&&money(x.payment_amount));else if(["IGR","IGS","IGP","TT"].includes(filter))j=j.filter(x=>String(x.content_type).includes(filter));return j}
function renderJobs(jobs){const el=document.querySelector("#jobList");if(!jobs.length){el.innerHTML='<div class="empty">All clear. No jobs here.</div>';return}el.innerHTML=jobs.map(j=>{const [pt,pc]=dueText(j.post_due),[st,sc]=dueText(j.storyline_due),[dt,dc]=dueText(j.draft_due);const cls=dateDiff(j.post_due)<0?"overdue":dateDiff(j.post_due)<=7&&dateDiff(j.post_due)!==null?"urgent":"";return`<article class="card ${cls}"><div class="top"><div class="brand">${esc(j.brand)}${j.campaign?` <span style="color:var(--muted);font-weight:500">- ${esc(j.campaign)}</span>`:""}</div><span class="tag">${esc(j.content_type)}</span><span class="pay">${esc(j.payment_status)}</span></div><div class="meta">${j.storyline_due?`<div class="mi"><span class="ml">Storyline</span><span class="mv ${sc}">${fmt(j.storyline_due)} (${st})</span></div>`:""}${j.draft_due?`<div class="mi"><span class="ml">Draft</span><span class="mv ${dc}">${fmt(j.draft_due)} (${dt})</span></div>`:""}<div class="mi"><span class="ml">Post Due</span><span class="mv ${pc}">${fmt(j.post_due)}${pt?` (${pt})`:""}</span></div>${money(j.payment_amount)?`<div class="mi"><span class="ml">Payment</span><span class="mv">${money(j.payment_amount)}</span></div>`:""}</div>${j.notes?`<div class="notes">${esc(j.notes)}</div>`:""}<div class="links">${j.brief_url?`<a target="_blank" href="${esc(j.brief_url)}">Brief</a>`:""}${j.posting_link?`<a target="_blank" href="${esc(j.posting_link)}">Posting Link</a>`:""}${j.video_link?`<a target="_blank" href="${esc(j.video_link)}">Video Link</a>`:""}</div></article>`}).join("")}
function renderPay(){const el=document.querySelector("#payList");const p=[...payments].sort((a,b)=>(a.payment_status==="Completed")-(b.payment_status==="Completed"));if(!p.length){el.innerHTML='<div class="empty">No payment items.</div>';return}el.innerHTML=p.map(j=>`<article class="card"><div class="pay-row"><div class="brand">${esc(j.brand)}${j.campaign?` <span style="color:var(--muted);font-weight:500">- ${esc(j.campaign)}</span>`:""}</div><div class="amount">${money(j.payment_amount)||"Follow Agmt"}</div><span class="pay">${esc(j.payment_status)}</span></div>${j.payday?`<div class="notes">Payday: ${esc(j.payday)}</div>`:""}${j.notes?`<div class="notes">${esc(j.notes)}</div>`:""}</article>`).join("")}
document.querySelector("#filters").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;filter=b.dataset.filter;document.querySelectorAll("#filters button").forEach(x=>x.classList.remove("active"));b.classList.add("active");render()});
load().catch(e=>{document.querySelector("#jobList").innerHTML=`<div class="empty">Connection error: ${esc(e.message)}</div>`;document.querySelector("#payList").innerHTML='<div class="empty">Google Sheet 暂时读不到。</div>'});
</script>
</body>
</html>
